<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tableau de bord — Événements réseau tram</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;font-size:14px}
select,input,textarea{font-family:inherit;font-size:13px;color:#1a1a1a;background:#fff;border:0.5px solid #ccc;border-radius:8px;padding:6px 10px;width:100%}
select:focus,input:focus,textarea:focus{outline:2px solid #378ADD;outline-offset:1px}
button{font-family:inherit;font-size:13px;cursor:pointer;border-radius:8px;border:0.5px solid #ccc;background:#fff;color:#1a1a1a;padding:6px 12px;transition:background 0.15s}
button:hover{background:#f0f0f0}
.btn-primary{background:#185FA5;color:#fff;border-color:#185FA5}
.btn-primary:hover{background:#0C447C}
.btn-danger{color:#A32D2D;border-color:#F09595}
.btn-danger:hover{background:#FCEBEB}
.btn-success{color:#3B6D11;border-color:#97C459}
.btn-success:hover{background:#EAF3DE}
.card{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:1rem 1.25rem}
.stat-card{background:#f0f0ec;border-radius:8px;padding:1rem;text-align:center}
.stat-label{font-size:12px;color:#666;margin-bottom:4px}
.stat-value{font-size:22px;font-weight:500}
label.lbl{display:block;font-size:12px;color:#666;margin-bottom:4px}
.alert-box{background:#FCEBEB;border:0.5px solid #F09595;border-radius:8px;padding:10px 14px;font-size:12px;color:#791F1F;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 10px;font-size:11px;color:#666;font-weight:500;border-bottom:0.5px solid #e0e0e0;white-space:nowrap}
td{padding:7px 10px;border-bottom:0.5px solid #e0e0e0;vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.tag-blue{background:#E6F1FB;color:#0C447C}
.tag-green{background:#EAF3DE;color:#27500A}
.bar-chart{display:flex;flex-direction:column;gap:6px;padding:8px 0}
.bar-row{display:flex;align-items:center;gap:8px;font-size:11px}
.bar-label{width:130px;text-align:right;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.bar-track{flex:1;background:#f0f0ec;border-radius:4px;height:18px;overflow:hidden}
.bar-fill{height:100%;background:#378ADD;border-radius:4px;transition:width 0.4s;display:flex;align-items:center;justify-content:flex-end;padding-right:4px}
.bar-val{font-size:10px;color:#fff;font-weight:500}
.mini-bar-fill{background:#639922}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.overflow-x{overflow-x:auto}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.section-title{font-size:13px;font-weight:500;color:#666;margin-bottom:10px;padding-bottom:6px;border-bottom:0.5px solid #e0e0e0}
.badge-alert{background:#FCEBEB;color:#A32D2D;border-radius:4px;padding:1px 6px;font-size:11px;font-weight:500}
input[type=checkbox]{width:auto;accent-color:#185FA5}
.main-layout{display:grid;grid-template-columns:300px 1fr;gap:14px;align-items:start}
.sticky-form{position:sticky;top:80px}
@media(max-width:800px){
  .main-layout{grid-template-columns:1fr}
  .sticky-form{position:static}
  .grid4{grid-template-columns:1fr 1fr}
  .grid2{grid-template-columns:1fr}
}
header{background:#fff;border-bottom:0.5px solid #e0e0e0;padding:14px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header-btns{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.content{padding:16px 20px;max-width:1200px;margin:0 auto}
#sync-status{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:500}
.sync-ok{background:#EAF3DE;color:#27500A}
.sync-loading{background:#FAEEDA;color:#633806}
.sync-error{background:#FCEBEB;color:#A32D2D}
</style>
</head>
<body>

<header>
  <div>
    <div style="font-size:17px;font-weight:500">Tableau de bord événements</div>
    <div style="font-size:12px;color:#888;margin-top:2px">Réseau tram — Partagé en temps réel</div>
  </div>
  <div class="header-btns">
    <span id="sync-status" class="sync-loading">⟳ Connexion...</span>
    <button onclick="exportXLSX()">Export XLSX (filtré)</button>
    <button onclick="exportParMois()">Export par mois</button>
    <label style="display:inline-block;padding:6px 12px;border:0.5px solid #ccc;border-radius:8px;cursor:pointer;font-size:13px;background:#fff">
      Import XLSX
      <input type="file" accept=".xlsx,.xls" style="display:none" onchange="importXLSX(this.files[0]).then(()=>this.value='')">
    </label>
    <button class="btn-danger" onclick="if(confirm('Supprimer tous les événements ?'))clearAll()">Tout effacer</button>
  </div>
</header>

<div class="content">
  <div id="loading" style="text-align:center;padding:60px;color:#888;font-size:14px">Chargement des données...</div>
  <div id="app" style="display:none"></div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, onSnapshot, query, orderBy, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDOPPTQwuJS-pUW8Yn65fapMAtVBSDy3OQ",
  authDomain: "tableau-tram.firebaseapp.com",
  projectId: "tableau-tram",
  storageBucket: "tableau-tram.firebasestorage.app",
  messagingSenderId: "936273926398",
  appId: "1:936273926398:web:30722bc9f404e002646daf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const colRef = collection(db, "evenements");

// —— Constantes ——
const EVENT_TYPES=["aiguille 24V","aiguille de jonction","croisement TB/TB","croisement TW/TB","croisement ouvert","courbe","câble","Armoire d'alimentation","Armoire de Pontage","Pompier/Police","Objet sur la ligne","Ebus","Pantographe"];
const TYPE_TO_MOTIFS={"aiguille 24V":["RAS","Moteur","Capteur de sortie","TRX","SWMZ","SP13","UMV","UBZ","Afficheur LED","Ventilateur","Antenne","Carte SD","Tube","Platine","file coupé/débranché"],"aiguille de jonction":["Aiguille de jonction","croisement","tube","œillet","patin en téflon"],"croisement TB/TB":["Croisement 20°","Croisement 30°","Croisement 40°","Croisement 45/90°","Montage tube","oeillet"],"croisement TW/TB":["Croisement TW/TB 45/90°","croisement 35/65°","montage tube"],"croisement ouvert":["Croisement complet","Corne de croisement","barre profilé","montage tube"],"courbe":["Montage tube","Nervure"],"câble":["Déconnecter","Brulé","décroché"],"Armoire d'alimentation":["Accidentée","Brulé"],"Armoire de Pontage":["Accidentée","Brulé"],"Pompier/Police":["Accident","incendie","fuite de Gaz"],"Objet sur la ligne":["Branche","Ballon","Sneakers","linge","bâche"],"Ebus":["Potence"],"Pantographe":["Tordue","cassé"]};
const LIGNE_TYPES=["TW","TB","Mixte","CMB","CMJ","CMC"];
const METEO_OPTIONS=["Ensoleillé","Nuageux","Pluie","Orage","Neige","Vent","Brouillard"];
const ALERT_THRESHOLD=8;
const GENEVA={lat:46.2044,lon:6.1432,tz:"Europe/Paris"};

// —— State ——
let events=[];
let state={
  form:{titre:"",date:"",lieu:"",type:EVENT_TYPES[0],ligne:LIGNE_TYPES[0],motif:"",meteo:"",heures:0,notes:"",agent:""},
  autoMeteo:true,loadingMeteo:false,
  editingId:null,editDraft:null,
  q:"",fType:"Tous",fLigne:"Toutes",fMotif:"Tous",fMeteo:"Toutes"
};

function setSyncStatus(status,msg){
  const el=document.getElementById("sync-status");
  if(!el)return;
  el.className="sync-"+status;
  el.textContent=msg;
}

// —— Météo ——
function mapWeatherCode(code,wind){
  if([95,96,99].includes(code))return"Orage";
  if((code>=61&&code<=67)||(code>=51&&code<=57)||(code>=80&&code<=82))return"Pluie";
  if((code>=71&&code<=77)||(code>=85&&code<=86))return"Neige";
  if(wind!=null&&wind>=50&&(code===0||[1,2,3,45,48].includes(code)))return"Vent";
  if(code===0)return"Ensoleillé";
  if([45,48].includes(code))return"Brouillard";
  return"Nuageux";
}
async function fetchMeteo(date){
  try{
    if(!date)return null;
    const ymd=date.slice(0,10);
    const today=new Date().toISOString().slice(0,10);
    const base=ymd<today?"https://archive-api.open-meteo.com/v1/archive":"https://api.open-meteo.com/v1/forecast";
    const url=new URL(base);
    url.searchParams.set("latitude",GENEVA.lat);
    url.searchParams.set("longitude",GENEVA.lon);
    url.searchParams.set("timezone",GENEVA.tz);
    url.searchParams.set("start_date",ymd);
    url.searchParams.set("end_date",ymd);
    url.searchParams.set("daily","weathercode,windspeed_10m_max");
    const res=await fetch(url.toString());
    const data=await res.json();
    const code=data?.daily?.weathercode?.[0];
    const wind=data?.daily?.windspeed_10m_max?.[0];
    if(typeof code!=="number")return null;
    return mapWeatherCode(code,typeof wind==="number"?wind:undefined);
  }catch{return null;}
}

function formatFR(iso){
  if(!iso)return"";
  const d=new Date(iso);
  if(isNaN(d.getTime()))return iso;
  return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"});
}

// —— Firestore listeners ——
function startListening(){
  const q2=query(colRef,orderBy("createdAt","desc"));
  onSnapshot(q2,(snapshot)=>{
    events=snapshot.docs.map(d=>({id:d.id,...d.data()}));
    setSyncStatus("ok","● En ligne — "+events.length+" événements");
    document.getElementById("loading").style.display="none";
    document.getElementById("app").style.display="block";
    render();
  },(err)=>{
    setSyncStatus("error","✕ Erreur connexion");
    console.error(err);
  });
}

// —— CRUD ——
async function addEvent(){
  const f=state.form;
  if(!f.titre||!f.date||!f.lieu||!f.motif){alert("Merci de remplir : Événement, Date, Lieu et Motif.");return;}
  setSyncStatus("loading","⟳ Enregistrement...");
  let meteo=f.meteo;
  if(state.autoMeteo){meteo=(await fetchMeteo(f.date))??meteo;}
  try{
    await addDoc(colRef,{
      titre:f.titre,date:f.date,lieu:f.lieu,type:f.type,ligne:f.ligne,
      motif:f.motif,meteo:meteo||"",heures:Number(f.heures)||0,
      notes:f.notes||"",agent:f.agent||"",
      createdAt:Date.now()
    });
    state.form={titre:"",date:"",lieu:"",type:EVENT_TYPES[0],ligne:LIGNE_TYPES[0],motif:"",meteo:"",heures:0,notes:"",agent:""};
    render();
  }catch(e){setSyncStatus("error","✕ Erreur");alert("Erreur: "+e.message);}
}

async function removeEvent(id){
  if(!confirm("Supprimer cet événement ?"))return;
  setSyncStatus("loading","⟳ Suppression...");
  try{await deleteDoc(doc(db,"evenements",id));}
  catch(e){setSyncStatus("error","✕ Erreur");alert("Erreur: "+e.message);}
}

async function saveEdit(){
  if(!state.editDraft||!state.editingId)return;
  setSyncStatus("loading","⟳ Mise à jour...");
  let meteo=state.editDraft.meteo;
  if(state.autoMeteo&&state.editDraft.date){meteo=(await fetchMeteo(state.editDraft.date))??meteo;}
  try{
    await updateDoc(doc(db,"evenements",state.editingId),{...state.editDraft,meteo});
    state.editingId=null;state.editDraft=null;render();
  }catch(e){setSyncStatus("error","✕ Erreur");alert("Erreur: "+e.message);}
}

async function clearAll(){
  setSyncStatus("loading","⟳ Suppression...");
  try{
    const snap=await getDocs(colRef);
    const batch=writeBatch(db);
    snap.docs.forEach(d=>batch.delete(d.ref));
    await batch.commit();
    state.editingId=null;state.editDraft=null;
  }catch(e){setSyncStatus("error","✕ Erreur");alert("Erreur: "+e.message);}
}

// —— Import/Export ——
function exportXLSX(){
  const evs=filtered();
  const data=evs.map(e=>({titre:e.titre,date:e.date,lieu:e.lieu,type:e.type,ligne:e.ligne,motif:e.motif,meteo:e.meteo,heures:e.heures,notes:e.notes||"",agent:e.agent||""}));
  const ws=XLSX.utils.json_to_sheet(data);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"evenements");
  XLSX.writeFile(wb,`evenements_${new Date().toISOString().slice(0,10)}.xlsx`);
}
window.exportXLSX=exportXLSX;

function exportParMois(){
  const evs=filtered();
  const groups={};
  evs.forEach(ev=>{const k=(ev.date||"").slice(0,7)||"inconnu";(groups[k]=groups[k]||[]).push(ev);});
  const wb=XLSX.utils.book_new();
  Object.entries(groups).forEach(([mois,rows])=>{
    const ws=XLSX.utils.json_to_sheet(rows.map(e=>({titre:e.titre,date:e.date,lieu:e.lieu,type:e.type,ligne:e.ligne,motif:e.motif,meteo:e.meteo,heures:e.heures,notes:e.notes||"",agent:e.agent||""})));
    XLSX.utils.book_append_sheet(wb,ws,mois.slice(0,31));
  });
  XLSX.writeFile(wb,`evenements_par_mois_${new Date().toISOString().slice(0,10)}.xlsx`);
}
window.exportParMois=exportParMois;

async function importXLSX(file){
  if(!file)return;
  const buf=await file.arrayBuffer();
  const wb=XLSX.read(buf,{type:"array"});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const json=XLSX.utils.sheet_to_json(ws,{defval:""});
  setSyncStatus("loading","⟳ Import en cours...");
  try{
    const batch=writeBatch(db);
    for(let i=0;i<json.length;i++){
      const r=json[i];
      let meteo=String(r.meteo||"");
      if(state.autoMeteo&&!meteo&&r.date){meteo=(await fetchMeteo(String(r.date).slice(0,10)))??"";}
      const ref=doc(collection(db,"evenements"));
      batch.set(ref,{
        titre:String(r.titre||""),date:String(r.date||"").slice(0,10),
        lieu:String(r.lieu||""),type:String(r.type||EVENT_TYPES[0]),
        ligne:String(r.ligne||LIGNE_TYPES[0]),motif:String(r.motif||""),
        meteo,heures:Number(r.heures||0)||0,
        notes:String(r.notes||""),agent:String(r.agent||""),
        createdAt:Date.now()-i
      });
    }
    await batch.commit();
  }catch(e){setSyncStatus("error","✕ Erreur import");alert("Erreur import: "+e.message);}
}
window.importXLSX=importXLSX;
window.clearAll=clearAll;

// —— Filtres ——
function filtered(){
  return events.filter(e=>{
    const matchQ=`${e.titre} ${e.lieu} ${e.type} ${e.ligne} ${e.motif} ${e.meteo} ${e.agent}`.toLowerCase().includes(state.q.toLowerCase());
    const mType=state.fType==="Tous"||e.type===state.fType;
    const mLigne=state.fLigne==="Toutes"||e.ligne===state.fLigne;
    const mMotif=state.fMotif==="Tous"||e.motif===state.fMotif;
    const mMeteo=state.fMeteo==="Toutes"||e.meteo===state.fMeteo;
    return matchQ&&mType&&mLigne&&mMotif&&mMeteo;
  });
}

function byType(evs){const m=new Map();evs.forEach(e=>m.set(e.type,(m.get(e.type)||0)+1));return Array.from(m.entries()).sort((a,b)=>b[1]-a[1]);}
function byMotif(evs){const m=new Map();evs.forEach(e=>m.set(e.motif,(m.get(e.motif)||0)+1));return Array.from(m.entries()).sort((a,b)=>b[1]-a[1]);}
function heuresByType(evs){const m=new Map();evs.forEach(e=>m.set(e.type,(m.get(e.type)||0)+(Number(e.heures)||0)));return Array.from(m.entries()).sort((a,b)=>b[1]-a[1]);}
function meteoIcon(m){return{"Ensoleillé":"☀","Nuageux":"⛅","Pluie":"🌧","Orage":"⛈","Neige":"❄","Vent":"💨","Brouillard":"🌫"}[m]||"";}

// —— Render ——
function render(){
  const evs=filtered();
  const total=evs.length;
  const totalH=evs.reduce((s,e)=>s+(Number(e.heures)||0),0);
  const typeArr=byType(evs);
  const motifArr=byMotif(evs);
  const heuresArr=heuresByType(evs);
  const maxH=heuresArr.length?heuresArr[0][1]:1;
  const maxM=motifArr.length?motifArr[0][1]:1;
  const alerts=motifArr.filter(([m,n])=>m&&n>=ALERT_THRESHOLD);
  const allMotifs=[...new Set(events.map(e=>e.motif).filter(Boolean))];
  const allMeteos=[...new Set(events.map(e=>e.meteo).filter(Boolean))];
  const f=state.form;
  const motifs=TYPE_TO_MOTIFS[f.type]||[];

  document.getElementById("app").innerHTML=`
${alerts.length?`<div class="alert-box" style="margin-bottom:14px"><strong>Alerte — motifs récurrents (≥${ALERT_THRESHOLD}x) :</strong> ${alerts.map(([m,n])=>`${m} <span class="badge-alert">${n}x</span>`).join(" &nbsp;·&nbsp; ")}</div>`:""}

<div class="main-layout">
<div class="card sticky-form">
  <div class="section-title">Nouvel événement</div>
  <div style="display:flex;flex-direction:column;gap:10px">
    <div>
      <label class="lbl">Événement</label>
      <select onchange="updateForm('titre',this.value)">
        <option value="">-- Sélectionner --</option>
        ${["intervention hors plage horaire","intervention","contrôle décâblage"].map(v=>`<option${f.titre===v?" selected":""}>${v}</option>`).join("")}
      </select>
    </div>
    <div class="form-row">
      <div><label class="lbl">Date</label><input type="date" value="${f.date}" onchange="updateForm('date',this.value)"></div>
      <div><label class="lbl">Lieu</label><input type="text" value="${f.lieu}" placeholder="Ville, site…" oninput="updateForm('lieu',this.value)"></div>
    </div>
    <div class="form-row">
      <div>
        <label class="lbl">Type</label>
        <select onchange="updateFormType(this.value)">
          ${EVENT_TYPES.map(t=>`<option${f.type===t?" selected":""}>${t}</option>`).join("")}
        </select>
      </div>
      <div>
        <label class="lbl">Ligne</label>
        <select onchange="updateForm('ligne',this.value)">
          ${LIGNE_TYPES.map(l=>`<option${f.ligne===l?" selected":""}>${l}</option>`).join("")}
        </select>
      </div>
    </div>
    <div>
      <label class="lbl">Motif</label>
      <select onchange="updateForm('motif',this.value)">
        <option value="">-- Sélectionner un motif --</option>
        ${motifs.map(m=>`<option${f.motif===m?" selected":""}>${m}</option>`).join("")}
      </select>
    </div>
    <div class="form-row">
      <div><label class="lbl">Heures (centièmes)</label><input type="number" step="0.01" min="0" value="${f.heures}" oninput="updateForm('heures',parseFloat(this.value)||0)"></div>
      <div>
        <label class="lbl">Météo</label>
        <select onchange="updateForm('meteo',this.value)">
          <option value="">Auto / saisir</option>
          ${METEO_OPTIONS.map(m=>`<option${f.meteo===m?" selected":""}>${m}</option>`).join("")}
        </select>
        <label style="font-size:11px;color:#666;margin-top:4px;display:flex;align-items:center;gap:5px">
          <input type="checkbox" ${state.autoMeteo?"checked":""} onchange="state.autoMeteo=this.checked"> Auto (Genève)
        </label>
      </div>
    </div>
    <div><label class="lbl">Agent / équipe</label><input type="text" value="${f.agent}" placeholder="Nom / équipe" oninput="updateForm('agent',this.value)"></div>
    <div><label class="lbl">Notes</label><textarea rows="2" oninput="updateForm('notes',this.value)">${f.notes}</textarea></div>
    <button class="btn-primary" onclick="addEvent()" style="width:100%;padding:8px">+ Ajouter l'événement</button>
  </div>
</div>

<div style="display:flex;flex-direction:column;gap:14px">
  <div class="card" style="padding:12px 14px">
    <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">
      <input type="text" placeholder="Rechercher…" value="${state.q}" oninput="state.q=this.value;render()" style="flex:1;min-width:150px">
      <select style="flex:1;min-width:120px" onchange="state.fType=this.value;render()">
        <option${state.fType==="Tous"?" selected":""}>Tous</option>
        ${EVENT_TYPES.map(t=>`<option${state.fType===t?" selected":""}>${t}</option>`).join("")}
      </select>
      <select style="flex:1;min-width:100px" onchange="state.fLigne=this.value;render()">
        <option${state.fLigne==="Toutes"?" selected":""}>Toutes</option>
        ${LIGNE_TYPES.map(l=>`<option${state.fLigne===l?" selected":""}>${l}</option>`).join("")}
      </select>
      <select style="flex:1;min-width:120px" onchange="state.fMotif=this.value;render()">
        <option${state.fMotif==="Tous"?" selected":""}>Tous</option>
        ${allMotifs.map(m=>`<option${state.fMotif===m?" selected":""}>${m}</option>`).join("")}
      </select>
      <select style="flex:1;min-width:110px" onchange="state.fMeteo=this.value;render()">
        <option${state.fMeteo==="Toutes"?" selected":""}>Toutes</option>
        ${allMeteos.map(m=>`<option${state.fMeteo===m?" selected":""}>${m}</option>`).join("")}
      </select>
    </div>
  </div>

  <div class="grid4">
    <div class="stat-card"><div class="stat-label">Événements</div><div class="stat-value">${total}</div></div>
    <div class="stat-card"><div class="stat-label">Heures totales</div><div class="stat-value">${totalH.toFixed(2)}</div></div>
    <div class="stat-card"><div class="stat-label">Types distincts</div><div class="stat-value">${new Set(evs.map(e=>e.type)).size}</div></div>
    <div class="stat-card"><div class="stat-label">Motifs distincts</div><div class="stat-value">${new Set(evs.map(e=>e.motif)).size}</div></div>
  </div>

  <div class="grid2">
    <div class="card">
      <div class="section-title">Heures par type</div>
      <div class="bar-chart">
        ${heuresArr.length===0?`<div style="color:#888;font-size:12px;text-align:center;padding:20px 0">Pas de données</div>`:heuresArr.map(([t,h])=>`
        <div class="bar-row"><div class="bar-label" title="${t}">${t}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(h/maxH*100)}%">${h>=0.5?`<span class="bar-val">${h.toFixed(1)}</span>`:""}</div></div></div>`).join("")}
      </div>
    </div>
    <div class="card">
      <div class="section-title">Top motifs</div>
      <div class="bar-chart">
        ${motifArr.filter(([m])=>m).length===0?`<div style="color:#888;font-size:12px;text-align:center;padding:20px 0">Pas de données</div>`:motifArr.filter(([m])=>m).slice(0,10).map(([m,n])=>`
        <div class="bar-row"><div class="bar-label" title="${m}">${m}</div>
        <div class="bar-track"><div class="bar-fill mini-bar-fill" style="width:${Math.round(n/maxM*100)}%">${n>=1?`<span class="bar-val">${n}</span>`:""}</div></div>
        ${n>=ALERT_THRESHOLD?`<span class="badge-alert">!</span>`:""}</div>`).join("")}
      </div>
    </div>
  </div>

  <div class="grid2">
    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:10px 14px;border-bottom:0.5px solid #e0e0e0;font-size:13px;font-weight:500">Répartition par type</div>
      <table><thead><tr><th>Type</th><th>Nb</th><th>%</th></tr></thead><tbody>
      ${typeArr.length===0?`<tr><td colspan="3" style="text-align:center;color:#888;padding:20px">Aucune donnée</td></tr>`:typeArr.map(([t,n])=>`<tr><td>${t}</td><td>${n}</td><td style="color:#888">${total?Math.round(n/total*100):0}%</td></tr>`).join("")}
      </tbody></table>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:10px 14px;border-bottom:0.5px solid #e0e0e0;font-size:13px;font-weight:500">Top motifs</div>
      <table><thead><tr><th>Motif</th><th>Nb</th></tr></thead><tbody>
      ${motifArr.filter(([m])=>m).length===0?`<tr><td colspan="2" style="text-align:center;color:#888;padding:20px">Aucune donnée</td></tr>`:motifArr.filter(([m])=>m).map(([m,n])=>`<tr style="${n>=ALERT_THRESHOLD?"background:#FFF5F5":""}"><td>${m}${n>=ALERT_THRESHOLD?` <span class="badge-alert">${n}x !</span>`:""}</td><td>${n}</td></tr>`).join("")}
      </tbody></table>
    </div>
  </div>

  <div class="card" style="padding:0;overflow:hidden">
    <div style="padding:10px 14px;border-bottom:0.5px solid #e0e0e0;font-size:13px;font-weight:500">
      Liste des événements <span style="color:#888;font-weight:400">(${evs.length})</span>
    </div>
    <div class="overflow-x">
    <table style="min-width:900px">
      <thead><tr><th>Événement</th><th>Date</th><th>Lieu</th><th>Type</th><th>Ligne</th><th>Motif</th><th>Météo</th><th>Heures</th><th>Agent</th><th>Notes</th><th>Actions</th></tr></thead>
      <tbody>
      ${evs.length===0?`<tr><td colspan="11" style="text-align:center;color:#888;padding:30px">Aucun résultat</td></tr>`:evs.map(e=>{
        if(state.editingId===e.id&&state.editDraft){
          const d=state.editDraft;
          const em=TYPE_TO_MOTIFS[d.type]||[];
          return`<tr style="background:#f9f9f9">
            <td><input value="${d.titre}" oninput="state.editDraft.titre=this.value" style="min-width:120px"></td>
            <td><input type="date" value="${d.date}" onchange="state.editDraft.date=this.value"></td>
            <td><input value="${d.lieu}" oninput="state.editDraft.lieu=this.value" style="min-width:80px"></td>
            <td><select onchange="state.editDraft.type=this.value;state.editDraft.motif='';render()">${EVENT_TYPES.map(t=>`<option${d.type===t?" selected":""}>${t}</option>`).join("")}</select></td>
            <td><select onchange="state.editDraft.ligne=this.value">${LIGNE_TYPES.map(l=>`<option${d.ligne===l?" selected":""}>${l}</option>`).join("")}</select></td>
            <td><select onchange="state.editDraft.motif=this.value"><option value="">--</option>${em.map(m=>`<option${d.motif===m?" selected":""}>${m}</option>`).join("")}</select></td>
            <td><select onchange="state.editDraft.meteo=this.value"><option value="">--</option>${METEO_OPTIONS.map(m=>`<option${d.meteo===m?" selected":""}>${m}</option>`).join("")}</select></td>
            <td><input type="number" step="0.01" min="0" value="${d.heures}" oninput="state.editDraft.heures=parseFloat(this.value)||0" style="width:70px;text-align:right"></td>
            <td><input value="${d.agent||""}" oninput="state.editDraft.agent=this.value" style="min-width:80px"></td>
            <td><textarea rows="1" oninput="state.editDraft.notes=this.value" style="min-width:100px">${d.notes||""}</textarea></td>
            <td style="white-space:nowrap">
              <button class="btn-success" onclick="saveEdit()" style="display:block;width:100%;margin-bottom:4px;font-size:12px">Sauver</button>
              <button onclick="state.editingId=null;state.editDraft=null;render()" style="display:block;width:100%;margin-bottom:4px;font-size:12px">Annuler</button>
              <button class="btn-danger" onclick="removeEvent('${e.id}')" style="display:block;width:100%;font-size:12px">Supprimer</button>
            </td></tr>`;
        }
        return`<tr>
          <td style="font-weight:500;max-width:140px">${e.titre}</td>
          <td style="white-space:nowrap">${formatFR(e.date)}</td>
          <td style="max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.lieu}</td>
          <td><span class="tag tag-blue">${e.type}</span></td>
          <td><span class="tag tag-green">${e.ligne}</span></td>
          <td>${e.motif}</td>
          <td style="white-space:nowrap">${meteoIcon(e.meteo)} ${e.meteo||""}</td>
          <td style="text-align:right">${Number(e.heures||0).toFixed(2)}</td>
          <td style="max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.agent||""}</td>
          <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#888" title="${(e.notes||"").replace(/"/g,"'")}"><small>${e.notes||""}</small></td>
          <td style="white-space:nowrap">
            <button onclick="startEdit('${e.id}')" style="font-size:12px;color:#185FA5">Modifier</button>
            <button class="btn-danger" onclick="removeEvent('${e.id}')" style="font-size:12px;margin-left:4px">Supprimer</button>
          </td></tr>`;
      }).join("")}
      </tbody>
    </table>
    </div>
  </div>
</div>
</div>

<div style="text-align:center;font-size:11px;color:#aaa;margin-top:20px;padding:16px 0;border-top:0.5px solid #e0e0e0">
  Données partagées en temps réel via Firebase — tous vos collègues voient les mêmes données
</div>`;
}

// —— Helpers globaux ——
window.updateForm=(k,v)=>{state.form[k]=v;render();};
window.updateFormType=(v)=>{state.form.type=v;state.form.motif="";render();};
window.addEvent=addEvent;
window.removeEvent=removeEvent;
window.saveEdit=saveEdit;
window.startEdit=(id)=>{
  const e=events.find(x=>x.id===id);
  if(!e)return;
  state.editingId=id;
  state.editDraft={titre:e.titre,date:e.date,lieu:e.lieu,type:e.type,ligne:e.ligne,motif:e.motif,meteo:e.meteo||"",heures:e.heures,notes:e.notes||"",agent:e.agent||""};
  render();
};

// —— Démarrage ——
startListening();
</script>
</body>
</html>
