<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tableau de bord — Événements réseau tram</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;font-size:14px}
select,input,textarea{font-family:inherit;font-size:13px;color:#1a1a1a;background:#fff;border:0.5px solid #ccc;border-radius:8px;padding:6px 10px;width:100%}
select:focus,input:focus,textarea:focus{outline:2px solid #378ADD;outline-offset:1px}
button{font-family:inherit;font-size:13px;cursor:pointer;border-radius:8px;border:0.5px solid #ccc;background:#fff;color:#1a1a1a;padding:6px 12px;transition:background 0.15s}
button:hover{background:#f0f0f0}
.btn-primary{background:#185FA5;color:#fff;border-color:#185FA5}
.btn-primary:hover{background:#0C447C}
.btn-danger{color:#A32D2D;border-color:#F09595}
.btn-danger:hover{background:#FCEBEB}
.btn-success{color:#3B6D11;border-color:#97C459}
.btn-success:hover{background:#EAF3DE}
.card{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:1rem 1.25rem}
.stat-card{background:#f0f0ec;border-radius:8px;padding:1rem;text-align:center}
.stat-label{font-size:12px;color:#666;margin-bottom:4px}
.stat-value{font-size:22px;font-weight:500}
label.lbl{display:block;font-size:12px;color:#666;margin-bottom:4px}
.alert-box{background:#FCEBEB;border:0.5px solid #F09595;border-radius:8px;padding:10px 14px;font-size:12px;color:#791F1F;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 10px;font-size:11px;color:#666;font-weight:500;border-bottom:0.5px solid #e0e0e0;white-space:nowrap}
td{padding:7px 10px;border-bottom:0.5px solid #e0e0e0;vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.tag-blue{background:#E6F1FB;color:#0C447C}
.tag-green{background:#EAF3DE;color:#27500A}
.bar-chart{display:flex;flex-direction:column;gap:6px;padding:8px 0}
.bar-row{display:flex;align-items:center;gap:8px;font-size:11px}
.bar-label{width:140px;text-align:right;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.bar-track{flex:1;background:#f0f0ec;border-radius:4px;height:18px;overflow:hidden}
.bar-fill{height:100%;background:#378ADD;border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:4px}
.bar-val{font-size:10px;color:#fff;font-weight:500}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.overflow-x{overflow-x:auto}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.section-title{font-size:13px;font-weight:500;color:#666;margin-bottom:10px;padding-bottom:6px;border-bottom:0.5px solid #e0e0e0}
.badge-alert{background:#FCEBEB;color:#A32D2D;border-radius:4px;padding:1px 6px;font-size:11px;font-weight:500}
input[type=checkbox]{width:auto;accent-color:#185FA5}
.main-layout{display:grid;grid-template-columns:310px 1fr;gap:14px;align-items:start}
.sticky-form{position:sticky;top:80px}
@media(max-width:800px){.main-layout{grid-template-columns:1fr}.sticky-form{position:static}.grid4{grid-template-columns:1fr 1fr}.grid2{grid-template-columns:1fr}.grid3{grid-template-columns:1fr}}
header{background:#fff;border-bottom:0.5px solid #e0e0e0;padding:14px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header-btns{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.content{padding:16px 20px;max-width:1300px;margin:0 auto}
#sync-status{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:500}
.sync-ok{background:#EAF3DE;color:#27500A}
.sync-loading{background:#FAEEDA;color:#633806}
.sync-error{background:#FCEBEB;color:#A32D2D}
.temp-badge{display:inline-block;background:#E6F1FB;color:#0C447C;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:500}
</style>
</head>
<body>

<header>
  <div>
    <div style="font-size:17px;font-weight:500">Tableau de bord événements</div>
    <div style="font-size:12px;color:#888;margin-top:2px">Réseau tram — Partagé en temps réel</div>
  </div>
  <div class="header-btns">
    <span id="sync-status" class="sync-loading">⟳ Connexion...</span>
    <button onclick="exportXLSX()">Export XLSX (filtré)</button>
    <button onclick="exportParMois()">Export par mois</button>
    <label style="display:inline-block;padding:6px 12px;border:0.5px solid #ccc;border-radius:8px;cursor:pointer;font-size:13px;background:#fff">
      Import XLSX
      <input type="file" accept=".xlsx,.xls" style="display:none" onchange="handleImport(this.files[0]).then(()=>this.value='')">
    </label>
    <button class="btn-danger" onclick="if(confirm('Supprimer tous les événements ?'))clearAll()">Tout effacer</button>
  </div>
</header>

<div class="content">
  <div id="loading" style="text-align:center;padding:60px;color:#888">Chargement des données...</div>
  <div id="main-layout" class="main-layout" style="display:none">

    <!-- FORMULAIRE FIXE -->
    <div class="card sticky-form">
      <div class="section-title">Nouvel événement</div>
      <div style="display:flex;flex-direction:column;gap:10px">

        <div><label class="lbl">Événement</label>
          <select id="f-titre">
            <option value="">-- Sélectionner --</option>
            <option>intervention hors plage horaire</option>
            <option>intervention</option>
            <option>contrôle décâblage</option>
          </select>
        </div>

        <div class="form-row">
          <div><label class="lbl">Date</label><input type="date" id="f-date"></div>
          <div><label class="lbl">Lieu</label><input type="text" id="f-lieu" placeholder="Ville, site…"></div>
        </div>

        <div class="form-row">
          <div><label class="lbl">Ligne</label>
            <select id="f-ligne" onchange="onLigneChange()">
              <option>TW</option><option>TB</option><option>Mixte</option>
              <option>CMB</option><option>CMJ</option><option>CMC</option>
            </select>
          </div>
          <div><label class="lbl">Type</label>
            <select id="f-type" onchange="onTypeChange()">
              <option value="">-- Choisir la ligne d'abord --</option>
            </select>
          </div>
        </div>

        <div><label class="lbl">Motif</label>
          <select id="f-motif"><option value="">-- Sélectionner un motif --</option></select>
        </div>

        <!-- Agents x3 -->
        <div><label class="lbl">Agents intervenants</label>
          <div class="grid3">
            <div><label class="lbl" style="font-size:11px">Agent 1</label>
              <select id="f-agent1" onchange="updateHeuresTotal()"><option value="">--</option></select>
            </div>
            <div><label class="lbl" style="font-size:11px">Agent 2</label>
              <select id="f-agent2" onchange="updateHeuresTotal()"><option value="">--</option></select>
            </div>
            <div><label class="lbl" style="font-size:11px">Agent 3</label>
              <select id="f-agent3" onchange="updateHeuresTotal()"><option value="">--</option></select>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div>
            <label class="lbl">Heures / agent</label>
            <input type="number" id="f-heures" step="0.01" min="0" value="0" oninput="updateHeuresTotal()">
            <div id="f-heures-total" style="font-size:11px;color:#185FA5;margin-top:3px;font-weight:500"></div>
          </div>
          <div>
            <label class="lbl">Météo <span id="meteo-loading" style="display:none;color:#888">⟳</span></label>
            <select id="f-meteo">
              <option value="">Auto / saisir</option>
              <option>Ensoleillé</option><option>Nuageux</option><option>Pluie</option>
              <option>Orage</option><option>Neige</option><option>Vent</option><option>Brouillard</option>
            </select>
            <label style="font-size:11px;color:#666;margin-top:4px;display:flex;align-items:center;gap:5px">
              <input type="checkbox" id="f-autometeo" checked> Auto (Genève)
            </label>
          </div>
        </div>

        <div>
          <label class="lbl">Température (°C) <span id="temp-loading" style="display:none;color:#888">⟳</span></label>
          <input type="number" id="f-temp" placeholder="Auto ou saisir manuellement" step="0.1">
        </div>

        <div><label class="lbl">Notes</label>
          <textarea id="f-notes" rows="2"></textarea>
        </div>

        <button class="btn-primary" onclick="addEvent()" style="width:100%;padding:8px">+ Ajouter l'événement</button>
      </div>
    </div>

    <!-- PARTIE DROITE -->
    <div id="right-panel" style="display:flex;flex-direction:column;gap:14px">
      <div class="card" style="padding:12px 14px">
        <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">
          <input type="text" id="filter-q" placeholder="Rechercher…" oninput="renderRight()" style="flex:1;min-width:150px">
          <select id="filter-ligne" onchange="renderRight()" style="flex:1;min-width:80px">
            <option>Toutes</option><option>TW</option><option>TB</option><option>Mixte</option>
            <option>CMB</option><option>CMJ</option><option>CMC</option>
          </select>
          <select id="filter-type" onchange="renderRight()" style="flex:1;min-width:120px"><option>Tous</option></select>
          <select id="filter-motif" onchange="renderRight()" style="flex:1;min-width:110px"><option>Tous</option></select>
          <select id="filter-meteo" onchange="renderRight()" style="flex:1;min-width:100px"><option>Toutes</option></select>
          <select id="filter-agent" onchange="renderRight()" style="flex:1;min-width:110px"><option>Tous agents</option></select>
        </div>
      </div>
      <div id="stats-area"></div>
      <div id="charts-area"></div>
      <div id="list-area"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, onSnapshot, query, orderBy, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDOPPTQwuJS-pUW8Yn65fapMAtVBSDy3OQ",
  authDomain: "tableau-tram.firebaseapp.com",
  projectId: "tableau-tram",
  storageBucket: "tableau-tram.firebasestorage.app",
  messagingSenderId: "936273926398",
  appId: "1:936273926398:web:30722bc9f404e002646daf"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const colRef = collection(db, "evenements");

// ——— Règle Ligne → Types ———
const LIGNE_TO_TYPES = {
  "TW":    ["Aiguille TW","Câble","Armoire d'alimentation","Armoire de Pontage","Pompier/Police","Objet sur la ligne","Pantographe","Sectionneur TW","Fil de contact","Croisement TW/TW","Autres"],
  "TB":    ["Aiguille 24V","Aiguille de jonction","Croisement TB/TB","Courbe","Câble","Armoire d'alimentation","Pompier/Police","Objet sur la ligne","Sectionneur TB","Fil de contact","Autres"],
  "Mixte": ["Croisement TW/TB","Croisement ouvert","Câble","Armoire d'alimentation","Armoire de Pontage","Pompier/Police","Objet sur la ligne","Fil de contact","Autres"],
  "CMB":   ["Aiguille TW","Croisement TW/TB","Croisement ouvert","Câble","Armoire d'alimentation","Pompier/Police","Objet sur la ligne","Ebus","Pantographe","Sectionneur TB","Sectionneur TW","Fil de contact","Croisement TW/TW","Autres"],
  "CMJ":   ["Aiguille 24V","Aiguille de jonction","Croisement TB/TB","Courbe","Câble","Armoire d'alimentation","Pompier/Police","Objet sur la ligne","Ebus","Tosa","Sectionneur TB","Fil de contact","Autres"],
  "CMC":   ["Aiguille TW","Croisement TW/TW","Câble","Armoire d'alimentation","Pompier/Police","Objet sur la ligne","Pantographe","Sectionneur TW","Fil de contact","Autres"]

// ——— Types → Motifs ———
const TYPE_TO_MOTIFS = {
  "Aiguille 24V":           ["RAS","Moteur","Capteur de sortie","TRX","SWMZ","SP13","UMV","UBZ","Afficheur LED","Ventilateur","Antenne","Carte SD","Tube","Platine","file coupé/débranché"],
  "Aiguille de jonction":   ["RAS","Aiguille de jonction","croisement","tube","œillet","patin en téflon"],
  "Aiguille TW":            ["RAS","câble déconnecté"],
  "Croisement TB/TB":       ["RAS","Croisement 20°","Croisement 30°","Croisement 40°","Croisement 45/90°","Montage tube","oeillet"],
  "Croisement TW/TB":       ["RAS","Croisement TW/TB 45/90°","croisement 35/65°","montage tube"],
  "Croisement TW/TW":       ["RAS","croisement en fils","croisement paëlla","croisement rigide","fil de contact"],
  "Croisement ouvert":      ["RAS","Croisement complet","Corne de croisement","barre profilé","montage tube"],
  "Courbe":                 ["RAS","Montage tube","Nervure"],
  "Câble":                  ["RAS","Déconnecter","Brulé","décroché"],
  "Armoire d'alimentation": ["RAS","Accidentée","Brulé"],
  "Armoire de Pontage":     ["RAS","Accidentée","Brulé"],
  "Pompier/Police":         ["RAS","Accident","incendie","fuite de Gaz"],
  "Objet sur la ligne":     ["RAS","Branche","Ballon","Sneakers","linge","bâche"],
  "Ebus":                   ["RAS","Potence","jukebox","câbles"],
  "Tosa":                   ["RAS","Potence"],
  "Pantographe":            ["RAS","Tordue","cassé"],
  "Sectionneur TB":         ["RAS","Sectionneur complet","Sectionneur à Air complet","barre isolante","diode +","diode -","bout de fils"],
  "Sectionneur TW":         ["RAS","sectionneur complet s/cp","sectionneur complet avec cp","sectionneur léger","corne"],
  "Fil de contact":         ["RAS","remplacement","usé","tordu"],
  "Autres":                 ["RAS","Élagage","Miroir","déraillement tram"]
};

const AGENTS = ["Dias","Rousset","Meystre","Torrado","Lopes","Martin","Lopez","Pipa","Marques","Franco","Ribeiro","Sousa","Amougou","Badraoui","Puchois","Agent voie","Agent R600V"];
const METEO_OPTIONS = ["Ensoleillé","Nuageux","Pluie","Orage","Neige","Vent","Brouillard"];
const LIGNE_TYPES = ["TW","TB","Mixte","CMB","CMJ","CMC"];
const ALL_TYPES = [...new Set(Object.values(LIGNE_TO_TYPES).flat())].sort();
const ALERT_THRESHOLD = 8;
const GENEVA = {lat:46.2044,lon:6.1432,tz:"Europe/Paris"};

let events = [];
let editingId = null;
let editDraft = null;

// ——— Météo + Température ———
function mapWeatherCode(code,wind){
  if([95,96,99].includes(code)) return "Orage";
  if((code>=61&&code<=67)||(code>=51&&code<=57)||(code>=80&&code<=82)) return "Pluie";
  if((code>=71&&code<=77)||(code>=85&&code<=86)) return "Neige";
  if(wind!=null&&wind>=50&&(code===0||[1,2,3,45,48].includes(code))) return "Vent";
  if(code===0) return "Ensoleillé";
  if([45,48].includes(code)) return "Brouillard";
  return "Nuageux";
}

async function fetchMeteoAndTemp(date){
  try{
    if(!date) return null;
    const ymd = date.slice(0,10);
    const today = new Date().toISOString().slice(0,10);
    const base = ymd<today ? "https://archive-api.open-meteo.com/v1/archive" : "https://api.open-meteo.com/v1/forecast";
    const url = new URL(base);
    url.searchParams.set("latitude",GENEVA.lat); url.searchParams.set("longitude",GENEVA.lon);
    url.searchParams.set("timezone",GENEVA.tz); url.searchParams.set("start_date",ymd); url.searchParams.set("end_date",ymd);
    url.searchParams.set("daily","weathercode,windspeed_10m_max,temperature_2m_max,temperature_2m_min");
    const res = await fetch(url.toString()); const data = await res.json();
    const code = data?.daily?.weathercode?.[0]; const wind = data?.daily?.windspeed_10m_max?.[0];
    const tmax = data?.daily?.temperature_2m_max?.[0]; const tmin = data?.daily?.temperature_2m_min?.[0];
    const meteo = typeof code==="number" ? mapWeatherCode(code, typeof wind==="number"?wind:undefined) : null;
    const temp = (typeof tmax==="number"&&typeof tmin==="number") ? Math.round((tmax+tmin)/2) : null;
    return {meteo,temp};
  }catch{ return null; }
}

function formatFR(iso){if(!iso)return"";const d=new Date(iso);if(isNaN(d.getTime()))return iso;return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"});}
function setSyncStatus(s,m){const el=document.getElementById("sync-status");if(!el)return;el.className="sync-"+s;el.textContent=m;}
function meteoIcon(m){return{"Ensoleillé":"☀","Nuageux":"⛅","Pluie":"🌧","Orage":"⛈","Neige":"❄","Vent":"💨","Brouillard":"🌫"}[m]||"";}
function nbAgents(e){return [e.agent1,e.agent2,e.agent3].filter(a=>a&&a.trim()!=="").length||1;}
function totalHeures(e){return (Number(e.heures)||0)*nbAgents(e);}

// ——— Init agents ———
function initAgentSelects(){
  ["f-agent1","f-agent2","f-agent3"].forEach(id=>{
    const sel=document.getElementById(id);if(!sel)return;
    sel.innerHTML=`<option value="">--</option>${AGENTS.map(a=>`<option>${a}</option>`).join("")}`;
  });
}

// ——— Mise à jour total heures ———
function updateHeuresTotal(){
  const h = parseFloat(document.getElementById("f-heures")?.value)||0;
  const n = ["f-agent1","f-agent2","f-agent3"].filter(id=>(document.getElementById(id)?.value||"").trim()!=="").length;
  const el = document.getElementById("f-heures-total");
  if(!el) return;
  el.textContent = n>1 ? `→ Total : ${(h*n).toFixed(2)}h (${n} agents × ${h}h)` : "";
}
window.updateHeuresTotal = updateHeuresTotal;

// ——— Ligne change → met à jour les types ———
function onLigneChange(){
  const ligne = document.getElementById("f-ligne").value;
  const types = LIGNE_TO_TYPES[ligne]||[];
  const sel = document.getElementById("f-type");
  sel.innerHTML = `<option value="">-- Sélectionner un type --</option>${types.map(t=>`<option>${t}</option>`).join("")}`;
  document.getElementById("f-motif").innerHTML = `<option value="">-- Sélectionner un motif --</option>`;
}
window.onLigneChange = onLigneChange;

// ——— Type change → met à jour les motifs ———
function onTypeChange(){
  const type = document.getElementById("f-type").value;
  const motifs = TYPE_TO_MOTIFS[type]||[];
  const sel = document.getElementById("f-motif");
  sel.innerHTML = `<option value="">-- Sélectionner un motif --</option>${motifs.map(m=>`<option>${m}</option>`).join("")}`;
}
window.onTypeChange = onTypeChange;

// ——— Auto météo + temp à la sélection de date ———
document.getElementById("f-date").addEventListener("change", async function(){
  if(!document.getElementById("f-autometeo").checked) return;
  document.getElementById("meteo-loading").style.display="inline";
  document.getElementById("temp-loading").style.display="inline";
  const result = await fetchMeteoAndTemp(this.value);
  document.getElementById("meteo-loading").style.display="none";
  document.getElementById("temp-loading").style.display="none";
  if(result?.meteo){
    const sel=document.getElementById("f-meteo");
    for(let i=0;i<sel.options.length;i++){if(sel.options[i].text===result.meteo){sel.selectedIndex=i;break;}}
  }
  if(result?.temp!=null) document.getElementById("f-temp").value=result.temp;
});

// ——— Firebase ———
function startListening(){
  const q=query(colRef,orderBy("createdAt","desc"));
  onSnapshot(q,(snap)=>{
    events=snap.docs.map(d=>({id:d.id,...d.data()}));
    setSyncStatus("ok","● En ligne — "+events.length+" événements");
    document.getElementById("loading").style.display="none";
    document.getElementById("main-layout").style.display="grid";
    updateFilterOptions();
    renderRight();
  },(err)=>{setSyncStatus("error","✕ Erreur connexion");console.error(err);});
}

function updateFilterOptions(){
  const allTypes  = [...new Set(events.map(e=>e.type).filter(Boolean))].sort();
  const allMotifs = [...new Set(events.map(e=>e.motif).filter(Boolean))].sort();
  const allMeteos = [...new Set(events.map(e=>e.meteo).filter(Boolean))];
  const allAgents = [...new Set(events.flatMap(e=>[e.agent1,e.agent2,e.agent3]).filter(Boolean))].sort();

  const ftSel=document.getElementById("filter-type"); const curT=ftSel.value;
  ftSel.innerHTML=`<option>Tous</option>${allTypes.map(t=>`<option${t===curT?" selected":""}>${t}</option>`).join("")}`;

  const fmSel=document.getElementById("filter-motif"); const curM=fmSel.value;
  fmSel.innerHTML=`<option>Tous</option>${allMotifs.map(m=>`<option${m===curM?" selected":""}>${m}</option>`).join("")}`;

  const feSel=document.getElementById("filter-meteo"); const curE=feSel.value;
  feSel.innerHTML=`<option>Toutes</option>${allMeteos.map(m=>`<option${m===curE?" selected":""}>${m}</option>`).join("")}`;

  const faSel=document.getElementById("filter-agent"); const curA=faSel.value;
  faSel.innerHTML=`<option>Tous agents</option>${allAgents.map(a=>`<option${a===curA?" selected":""}>${a}</option>`).join("")}`;
}

// ——— Ajouter ———
async function addEvent(){
  const titre  = document.getElementById("f-titre").value;
  const date   = document.getElementById("f-date").value;
  const lieu   = document.getElementById("f-lieu").value.trim();
  const ligne  = document.getElementById("f-ligne").value;
  const type   = document.getElementById("f-type").value;
  const motif  = document.getElementById("f-motif").value;
  const heures = parseFloat(document.getElementById("f-heures").value)||0;
  const agent1 = document.getElementById("f-agent1").value;
  const agent2 = document.getElementById("f-agent2").value;
  const agent3 = document.getElementById("f-agent3").value;
  const notes  = document.getElementById("f-notes").value.trim();
  const autoM  = document.getElementById("f-autometeo").checked;
  let meteo    = document.getElementById("f-meteo").value;
  let temp     = parseFloat(document.getElementById("f-temp").value);

  if(!titre||!date||!lieu||!type||!motif){alert("Merci de remplir : Événement, Date, Lieu, Type et Motif.");return;}
  setSyncStatus("loading","⟳ Enregistrement...");

  if(autoM){
    document.getElementById("meteo-loading").style.display="inline";
    const result=await fetchMeteoAndTemp(date);
    document.getElementById("meteo-loading").style.display="none";
    if(result?.meteo) meteo=result.meteo;
    if(result?.temp!=null&&isNaN(temp)) temp=result.temp;
  }

  const nbAg=[agent1,agent2,agent3].filter(a=>a&&a.trim()!=="").length||1;
  try{
    await addDoc(colRef,{
      titre,date,lieu,ligne,type,motif,
      meteo:meteo||"", temperature:isNaN(temp)?null:temp,
      heures, heuresTotal:heures*nbAg, nbAgents:nbAg,
      agent1:agent1||"",agent2:agent2||"",agent3:agent3||"",
      notes, createdAt:Date.now()
    });
    document.getElementById("f-titre").value="";
    document.getElementById("f-date").value="";
    document.getElementById("f-lieu").value="";
    document.getElementById("f-ligne").value="TW";
    document.getElementById("f-heures").value="0";
    document.getElementById("f-heures-total").textContent="";
    document.getElementById("f-agent1").value="";
    document.getElementById("f-agent2").value="";
    document.getElementById("f-agent3").value="";
    document.getElementById("f-notes").value="";
    document.getElementById("f-meteo").value="";
    document.getElementById("f-temp").value="";
    onLigneChange();
  }catch(e){setSyncStatus("error","✕ Erreur");alert("Erreur: "+e.message);}
}
window.addEvent=addEvent;

// ——— Supprimer ———
async function removeEvent(id){
  if(!confirm("Supprimer cet événement ?"))return;
  setSyncStatus("loading","⟳ Suppression...");
  try{await deleteDoc(doc(db,"evenements",id));}
  catch(e){setSyncStatus("error","✕ Erreur");alert("Erreur: "+e.message);}
}
window.removeEvent=removeEvent;

// ——— Édition ———
window.startEdit=(id)=>{
  const e=events.find(x=>x.id===id);if(!e)return;
  editingId=id;
  editDraft={titre:e.titre,date:e.date,lieu:e.lieu,ligne:e.ligne||"TW",type:e.type,motif:e.motif,
    meteo:e.meteo||"",temperature:e.temperature??null,heures:e.heures,
    agent1:e.agent1||"",agent2:e.agent2||"",agent3:e.agent3||"",notes:e.notes||""};
  renderRight();
};
window.cancelEdit=()=>{editingId=null;editDraft=null;renderRight();};
window.saveEdit=async()=>{
  if(!editDraft||!editingId)return;
  editDraft.lieu  =document.getElementById("edit-lieu")?.value||editDraft.lieu;
  editDraft.agent1=document.getElementById("edit-ag1")?.value||"";
  editDraft.agent2=document.getElementById("edit-ag2")?.value||"";
  editDraft.agent3=document.getElementById("edit-ag3")?.value||"";
  editDraft.notes =document.getElementById("edit-notes")?.value||editDraft.notes;
  const tv=parseFloat(document.getElementById("edit-temp")?.value);
  editDraft.temperature=isNaN(tv)?null:tv;
  const nbAg=[editDraft.agent1,editDraft.agent2,editDraft.agent3].filter(a=>a&&a.trim()!=="").length||1;
  editDraft.nbAgents=nbAg; editDraft.heuresTotal=editDraft.heures*nbAg;
  setSyncStatus("loading","⟳ Mise à jour...");
  try{await updateDoc(doc(db,"evenements",editingId),editDraft);editingId=null;editDraft=null;renderRight();}
  catch(e){setSyncStatus("error","✕ Erreur");alert("Erreur: "+e.message);}
};

// ——— Clear all ———
async function clearAll(){
  setSyncStatus("loading","⟳ Suppression...");
  try{
    const snap=await getDocs(colRef);const batch=writeBatch(db);
    snap.docs.forEach(d=>batch.delete(d.ref));await batch.commit();
    editingId=null;editDraft=null;
  }catch(e){setSyncStatus("error","✕ Erreur");alert("Erreur: "+e.message);}
}
window.clearAll=clearAll;

// ——— Export ———
function exportXLSX(){
  const evs=filtered();
  const ws=XLSX.utils.json_to_sheet(evs.map(e=>({
    titre:e.titre,date:e.date,lieu:e.lieu,ligne:e.ligne,type:e.type,motif:e.motif,
    meteo:e.meteo,temperature:e.temperature??'',
    heures_par_agent:e.heures,nb_agents:nbAgents(e),heures_total:totalHeures(e),
    agent1:e.agent1||"",agent2:e.agent2||"",agent3:e.agent3||"",notes:e.notes||""
  })));
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"evenements");
  XLSX.writeFile(wb,`evenements_${new Date().toISOString().slice(0,10)}.xlsx`);
}
window.exportXLSX=exportXLSX;

function exportParMois(){
  const evs=filtered();const groups={};
  evs.forEach(ev=>{const k=(ev.date||"").slice(0,7)||"inconnu";(groups[k]=groups[k]||[]).push(ev);});
  const wb=XLSX.utils.book_new();
  Object.entries(groups).forEach(([mois,rows])=>{
    const ws=XLSX.utils.json_to_sheet(rows.map(e=>({
      titre:e.titre,date:e.date,lieu:e.lieu,ligne:e.ligne,type:e.type,motif:e.motif,
      meteo:e.meteo,temperature:e.temperature??'',
      heures_par_agent:e.heures,nb_agents:nbAgents(e),heures_total:totalHeures(e),
      agent1:e.agent1||"",agent2:e.agent2||"",agent3:e.agent3||"",notes:e.notes||""
    })));
    XLSX.utils.book_append_sheet(wb,ws,mois.slice(0,31));
  });
  XLSX.writeFile(wb,`evenements_par_mois_${new Date().toISOString().slice(0,10)}.xlsx`);
}
window.exportParMois=exportParMois;

async function handleImport(file){
  if(!file)return;
  const buf=await file.arrayBuffer();const wb=XLSX.read(buf,{type:"array"});
  const ws=wb.Sheets[wb.SheetNames[0]];const json=XLSX.utils.sheet_to_json(ws,{defval:""});
  setSyncStatus("loading","⟳ Import en cours...");
  try{
    const batch=writeBatch(db);
    for(let i=0;i<json.length;i++){
      const r=json[i];
      const ref=doc(collection(db,"evenements"));
      const heures=Number(r.heures_par_agent||r.heures||0)||0;
      const ag1=String(r.agent1||""),ag2=String(r.agent2||""),ag3=String(r.agent3||"");
      const nbAg=[ag1,ag2,ag3].filter(a=>a.trim()!=="").length||1;
      batch.set(ref,{
        titre:String(r.titre||""),date:String(r.date||"").slice(0,10),
        lieu:String(r.lieu||""),ligne:String(r.ligne||"TW"),
        type:String(r.type||""),motif:String(r.motif||""),
        meteo:String(r.meteo||""),temperature:Number(r.temperature)||null,
        heures,heuresTotal:heures*nbAg,nbAgents:nbAg,
        agent1:ag1,agent2:ag2,agent3:ag3,
        notes:String(r.notes||""),createdAt:Date.now()-i
      });
    }
    await batch.commit();
  }catch(e){setSyncStatus("error","✕ Erreur import");alert("Erreur import: "+e.message);}
}
window.handleImport=handleImport;

// ——— Filtres ———
function filtered(){
  const q  =(document.getElementById("filter-q")?.value||"").toLowerCase();
  const fL =document.getElementById("filter-ligne")?.value||"Toutes";
  const fT =document.getElementById("filter-type")?.value||"Tous";
  const fM =document.getElementById("filter-motif")?.value||"Tous";
  const fE =document.getElementById("filter-meteo")?.value||"Toutes";
  const fA =document.getElementById("filter-agent")?.value||"Tous agents";
  return events.filter(e=>{
    const mQ=`${e.titre} ${e.lieu} ${e.ligne} ${e.type} ${e.motif} ${e.meteo} ${e.agent1} ${e.agent2} ${e.agent3}`.toLowerCase().includes(q);
    const mA=fA==="Tous agents"||[e.agent1,e.agent2,e.agent3].includes(fA);
    return mQ&&(fL==="Toutes"||e.ligne===fL)&&(fT==="Tous"||e.type===fT)&&(fM==="Tous"||e.motif===fM)&&(fE==="Toutes"||e.meteo===fE)&&mA;
  });
}

// ——— Rendu côté droit ———
function renderRight(){
  const evs=filtered();
  const total=evs.length;
  const totalH=evs.reduce((s,e)=>s+totalHeures(e),0);
  const totalAg=evs.reduce((s,e)=>s+nbAgents(e),0);

  // Stats
  document.getElementById("stats-area").innerHTML=`
  <div class="grid4">
    <div class="stat-card"><div class="stat-label">Événements</div><div class="stat-value">${total}</div></div>
    <div class="stat-card"><div class="stat-label">Heures totales</div><div class="stat-value">${totalH.toFixed(2)}</div></div>
    <div class="stat-card"><div class="stat-label">Interventions agents</div><div class="stat-value">${totalAg}</div></div>
    <div class="stat-card"><div class="stat-label">Types distincts</div><div class="stat-value">${new Set(evs.map(e=>e.type)).size}</div></div>
  </div>`;

  // Graphiques
  const typeMap=new Map();evs.forEach(e=>typeMap.set(e.type,(typeMap.get(e.type)||0)+1));
  const typeArr=[...typeMap.entries()].sort((a,b)=>b[1]-a[1]);
  const motifMap=new Map();evs.forEach(e=>motifMap.set(e.motif,(motifMap.get(e.motif)||0)+1));
  const motifArr=[...motifMap.entries()].sort((a,b)=>b[1]-a[1]);
  const heuresMap=new Map();evs.forEach(e=>heuresMap.set(e.type,(heuresMap.get(e.type)||0)+totalHeures(e)));
  const heuresArr=[...heuresMap.entries()].sort((a,b)=>b[1]-a[1]);
  const agentMap=new Map();
  evs.forEach(e=>{[e.agent1,e.agent2,e.agent3].filter(a=>a&&a.trim()!=="").forEach(a=>agentMap.set(a,(agentMap.get(a)||0)+(Number(e.heures)||0)));});
  const agentArr=[...agentMap.entries()].sort((a,b)=>b[1]-a[1]);
  const ligneMap=new Map();evs.forEach(e=>ligneMap.set(e.ligne,(ligneMap.get(e.ligne)||0)+1));
  const ligneArr=[...ligneMap.entries()].sort((a,b)=>b[1]-a[1]);
  const maxH=heuresArr.length?heuresArr[0][1]:1;
  const maxM=motifArr.length?motifArr[0][1]:1;
  const maxA=agentArr.length?agentArr[0][1]:1;
  const maxL=ligneArr.length?ligneArr[0][1]:1;
  const alerts=motifArr.filter(([m,n])=>m&&n>=ALERT_THRESHOLD);

  document.getElementById("charts-area").innerHTML=`
  ${alerts.length?`<div class="alert-box"><strong>Alerte — motifs récurrents (≥${ALERT_THRESHOLD}x) :</strong> ${alerts.map(([m,n])=>`${m} <span class="badge-alert">${n}x</span>`).join(" &nbsp;·&nbsp; ")}</div>`:""}
  <div class="grid2">
    <div class="card"><div class="section-title">Heures totales par type</div><div class="bar-chart">
      ${heuresArr.length===0?`<div style="color:#888;font-size:12px;text-align:center;padding:20px 0">Pas de données</div>`:heuresArr.map(([t,h])=>`<div class="bar-row"><div class="bar-label" title="${t}">${t}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(h/maxH*100)}%">${h>=0.5?`<span class="bar-val">${h.toFixed(1)}</span>`:""}</div></div></div>`).join("")}
    </div></div>
    <div class="card"><div class="section-title">Heures par agent</div><div class="bar-chart">
      ${agentArr.length===0?`<div style="color:#888;font-size:12px;text-align:center;padding:20px 0">Pas de données</div>`:agentArr.map(([a,h])=>`<div class="bar-row"><div class="bar-label" title="${a}">${a}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(h/maxA*100)}%;background:#8b5cf6">${h>=0.5?`<span class="bar-val">${h.toFixed(1)}</span>`:""}</div></div></div>`).join("")}
    </div></div>
  </div>
  <div class="grid2" style="margin-top:12px">
    <div class="card"><div class="section-title">Top motifs</div><div class="bar-chart">
      ${motifArr.filter(([m])=>m).length===0?`<div style="color:#888;font-size:12px;text-align:center;padding:20px 0">Pas de données</div>`:motifArr.filter(([m])=>m).slice(0,10).map(([m,n])=>`<div class="bar-row"><div class="bar-label" title="${m}">${m}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/maxM*100)}%;background:#639922">${n>=1?`<span class="bar-val">${n}</span>`:""}</div></div>${n>=ALERT_THRESHOLD?`<span class="badge-alert">!</span>`:""}</div>`).join("")}
    </div></div>
    <div class="card"><div class="section-title">Événements par ligne</div><div class="bar-chart">
      ${ligneArr.length===0?`<div style="color:#888;font-size:12px;text-align:center;padding:20px 0">Pas de données</div>`:ligneArr.map(([l,n])=>`<div class="bar-row"><div class="bar-label">${l}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/maxL*100)}%;background:#f59e0b">${n>=1?`<span class="bar-val">${n}</span>`:""}</div></div></div>`).join("")}
    </div></div>
  </div>`;

  // Liste
  const agOpts=`<option value="">--</option>${AGENTS.map(a=>`<option>${a}</option>`).join("")}`;
  const metOpts=`<option value="">--</option>${METEO_OPTIONS.map(m=>`<option>${m}</option>`).join("")}`;

  document.getElementById("list-area").innerHTML=`
  <div class="card" style="padding:0;overflow:hidden">
    <div style="padding:10px 14px;border-bottom:0.5px solid #e0e0e0;font-size:13px;font-weight:500">
      Liste des événements <span style="color:#888;font-weight:400">(${evs.length})</span>
    </div>
    <div class="overflow-x"><table style="min-width:1150px">
      <thead><tr>
        <th>Événement</th><th>Date</th><th>Lieu</th><th>Ligne</th><th>Type</th><th>Motif</th>
        <th>Météo</th><th>Temp.</th><th>H/ag</th><th>Agents</th><th>H.total</th><th>Notes</th><th>Actions</th>
      </tr></thead>
      <tbody>
      ${evs.length===0?`<tr><td colspan="13" style="text-align:center;color:#888;padding:30px">Aucun résultat</td></tr>`:evs.map(e=>{
        if(editingId===e.id&&editDraft){
          const d=editDraft;
          const typesEdit=LIGNE_TO_TYPES[d.ligne]||ALL_TYPES;
          const motifsEdit=TYPE_TO_MOTIFS[d.type]||[];
          return`<tr style="background:#f9f9f9">
            <td><input value="${d.titre}" onchange="editDraft.titre=this.value" style="min-width:120px"></td>
            <td><input type="date" value="${d.date}" onchange="editDraft.date=this.value"></td>
            <td><input id="edit-lieu" value="${d.lieu}" style="min-width:70px"></td>
            <td><select onchange="editDraft.ligne=this.value;editDraft.type='';editDraft.motif='';renderRight()">${LIGNE_TYPES.map(l=>`<option${d.ligne===l?" selected":""}>${l}</option>`).join("")}</select></td>
            <td><select onchange="editDraft.type=this.value;editDraft.motif='';renderRight()"><option value="">--</option>${typesEdit.map(t=>`<option${d.type===t?" selected":""}>${t}</option>`).join("")}</select></td>
            <td><select onchange="editDraft.motif=this.value"><option value="">--</option>${motifsEdit.map(m=>`<option${d.motif===m?" selected":""}>${m}</option>`).join("")}</select></td>
            <td><select onchange="editDraft.meteo=this.value">${metOpts}</select></td>
            <td><input id="edit-temp" type="number" step="0.1" value="${d.temperature??''}" style="width:55px"></td>
            <td><input type="number" step="0.01" min="0" value="${d.heures}" onchange="editDraft.heures=parseFloat(this.value)||0" style="width:60px"></td>
            <td>
              <select id="edit-ag1" style="margin-bottom:3px">${agOpts}</select>
              <select id="edit-ag2" style="margin-bottom:3px">${agOpts}</select>
              <select id="edit-ag3">${agOpts}</select>
            </td>
            <td style="color:#888;font-size:11px">${totalHeures(d).toFixed(2)}</td>
            <td><textarea id="edit-notes" rows="1" style="min-width:80px">${d.notes||""}</textarea></td>
            <td style="white-space:nowrap">
              <button class="btn-success" onclick="saveEdit()" style="display:block;width:100%;margin-bottom:4px;font-size:12px">Sauver</button>
              <button onclick="cancelEdit()" style="display:block;width:100%;margin-bottom:4px;font-size:12px">Annuler</button>
              <button class="btn-danger" onclick="removeEvent('${e.id}')" style="display:block;width:100%;font-size:12px">Supprimer</button>
            </td></tr>`;
        }
        const agentsStr=[e.agent1,e.agent2,e.agent3].filter(a=>a&&a.trim()!=="").join(", ");
        return`<tr>
          <td style="font-weight:500">${e.titre}</td>
          <td style="white-space:nowrap">${formatFR(e.date)}</td>
          <td>${e.lieu}</td>
          <td><span class="tag tag-green" style="font-size:10px">${e.ligne||""}</span></td>
          <td><span class="tag tag-blue" style="font-size:10px">${e.type}</span></td>
          <td>${e.motif}</td>
          <td style="white-space:nowrap">${meteoIcon(e.meteo)} ${e.meteo||""}</td>
          <td style="text-align:center">${e.temperature!=null?`<span class="temp-badge">${e.temperature}°C</span>`:""}</td>
          <td style="text-align:right">${Number(e.heures||0).toFixed(2)}</td>
          <td style="font-size:11px;color:#555">${agentsStr||"—"}</td>
          <td style="text-align:right;font-weight:500">${totalHeures(e).toFixed(2)}</td>
          <td style="max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#888" title="${(e.notes||"").replace(/"/g,"'")}"><small>${e.notes||""}</small></td>
          <td style="white-space:nowrap">
            <button onclick="startEdit('${e.id}')" style="font-size:12px;color:#185FA5">Modifier</button>
            <button class="btn-danger" onclick="removeEvent('${e.id}')" style="font-size:12px;margin-left:4px">Supprimer</button>
          </td></tr>`;
      }).join("")}
      </tbody>
    </table></div>
  </div>
  <div style="text-align:center;font-size:11px;color:#aaa;margin-top:8px;padding:12px 0;border-top:0.5px solid #e0e0e0">
    Données partagées en temps réel via Firebase
  </div>`;

  // Pré-sélection agents en mode édition
  if(editingId&&editDraft){
    const setVal=(id,val)=>{const s=document.getElementById(id);if(!s||!val)return;for(let i=0;i<s.options.length;i++){if(s.options[i].text===val){s.selectedIndex=i;break;}}};
    setVal("edit-ag1",editDraft.agent1);setVal("edit-ag2",editDraft.agent2);setVal("edit-ag3",editDraft.agent3);
  }
}
window.renderRight=renderRight;

// ——— Init ———
initAgentSelects();
onLigneChange();
startListening();
</script>
</body>
