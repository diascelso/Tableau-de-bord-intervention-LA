<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tableau de bord — Événements réseau tram</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;font-size:14px}
select,input,textarea{font-family:inherit;font-size:13px;color:#1a1a1a;background:#fff;border:0.5px solid #ccc;border-radius:8px;padding:6px 10px;width:100%}
select:focus,input:focus,textarea:focus{outline:2px solid #378ADD;outline-offset:1px}
button{font-family:inherit;font-size:13px;cursor:pointer;border-radius:8px;border:0.5px solid #ccc;background:#fff;color:#1a1a1a;padding:6px 12px;transition:background 0.15s}
button:hover{background:#f0f0f0}
.btn-primary{background:#185FA5;color:#fff;border-color:#185FA5}
.btn-primary:hover{background:#0C447C}
.btn-danger{color:#A32D2D;border-color:#F09595}
.btn-danger:hover{background:#FCEBEB}
.btn-success{color:#3B6D11;border-color:#97C459}
.btn-success:hover{background:#EAF3DE}
.card{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:1rem 1.25rem}
.stat-card{background:#f0f0ec;border-radius:8px;padding:1rem;text-align:center}
.stat-label{font-size:12px;color:#666;margin-bottom:4px}
.stat-value{font-size:22px;font-weight:500}
label.lbl{display:block;font-size:12px;color:#666;margin-bottom:4px}
.alert-box{background:#FCEBEB;border:0.5px solid #F09595;border-radius:8px;padding:10px 14px;font-size:12px;color:#791F1F;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 10px;font-size:11px;color:#666;font-weight:500;border-bottom:0.5px solid #e0e0e0;white-space:nowrap}
td{padding:7px 10px;border-bottom:0.5px solid #e0e0e0;vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.tag-blue{background:#E6F1FB;color:#0C447C}
.tag-green{background:#EAF3DE;color:#27500A}
.tag-amber{background:#FAEEDA;color:#633806}
.bar-chart{display:flex;flex-direction:column;gap:6px;padding:8px 0}
.bar-row{display:flex;align-items:center;gap:8px;font-size:11px}
.bar-label{width:140px;text-align:right;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.bar-track{flex:1;background:#f0f0ec;border-radius:4px;height:18px;overflow:hidden}
.bar-fill{height:100%;background:#378ADD;border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:4px}
.bar-val{font-size:10px;color:#fff;font-weight:500}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.overflow-x{overflow-x:auto}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.section-title{font-size:13px;font-weight:500;color:#666;margin-bottom:10px;padding-bottom:6px;border-bottom:0.5px solid #e0e0e0}
.badge-alert{background:#FCEBEB;color:#A32D2D;border-radius:4px;padding:1px 6px;font-size:11px;font-weight:500}
input[type=checkbox]{width:auto;accent-color:#185FA5}
.main-layout{display:grid;grid-template-columns:320px 1fr;gap:14px;align-items:start}
.sticky-form{position:sticky;top:80px}
@media(max-width:900px){.main-layout{grid-template-columns:1fr}.sticky-form{position:static}.grid4{grid-template-columns:1fr 1fr}.grid2{grid-template-columns:1fr}.grid3{grid-template-columns:1fr}}
header{background:#fff;border-bottom:0.5px solid #e0e0e0;padding:14px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header-btns{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.content{padding:16px 20px;max-width:1400px;margin:0 auto}
#sync-status{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:500}
.sync-ok{background:#EAF3DE;color:#27500A}
.sync-loading{background:#FAEEDA;color:#633806}
.sync-error{background:#FCEBEB;color:#A32D2D}
.temp-badge{display:inline-block;background:#E6F1FB;color:#0C447C;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:500}
#poste-row{display:none}
</style>
</head>
<body>
<header>
  <div>
    <div style="font-size:17px;font-weight:500">Tableau de bord événements</div>
    <div style="font-size:12px;color:#888;margin-top:2px">Réseau tram — Partagé en temps réel</div>
  </div>
  <div class="header-btns">
    <span id="sync-status" class="sync-loading">⟳ Connexion...</span>
    <button onclick="exportXLSX()">Export XLSX (filtré)</button>
    <button onclick="exportParMois()">Export par mois</button>
    <label style="display:inline-block;padding:6px 12px;border:0.5px solid #ccc;border-radius:8px;cursor:pointer;font-size:13px;background:#fff">
      Import XLSX
      <input type="file" accept=".xlsx,.xls" style="display:none" onchange="handleImport(this.files[0]).then(()=>this.value='')">
    </label>
  </div>
</header>

<div class="content">
  <div id="loading" style="text-align:center;padding:60px;color:#888">Chargement des données...</div>
  <div id="main-layout" class="main-layout" style="display:none">

    <!-- FORMULAIRE FIXE -->
    <div class="card sticky-form">
      <div class="section-title">Nouvel événement</div>
      <div style="display:flex;flex-direction:column;gap:10px">

        <div><label class="lbl">Événement</label>
          <select id="f-titre">
            <option value="">-- Sélectionner --</option>
            <option>intervention hors plage horaire</option>
            <option>intervention</option>
            <option>contrôle décâblage</option>
          </select>
        </div>

        <div class="form-row">
          <div><label class="lbl">Date</label><input type="date" id="f-date"></div>
          <div><label class="lbl">Lieu</label><input type="text" id="f-lieu" placeholder="Ville, site…"></div>
        </div>

        <div class="form-row">
          <div><label class="lbl">Ligne</label>
            <select id="f-ligne" onchange="onLigneChange()">
              <option>TW</option><option>TB</option><option>Mixte</option>
              <option>CMB</option><option>CMJ</option><option>CMC</option>
            </select>
          </div>
          <div><label class="lbl">Type</label>
            <select id="f-type" onchange="onTypeChange()">
              <option value="">-- Choisir la ligne --</option>
            </select>
          </div>
        </div>

        <div><label class="lbl">Motif</label>
          <select id="f-motif"><option value="">-- Sélectionner un motif --</option></select>
        </div>

        <!-- Poste technique (affiché selon le type) -->
        <div id="poste-row">
          <label class="lbl">Poste technique</label>
          <select id="f-poste"><option value="">-- Sélectionner --</option></select>
        </div>

        <!-- Agents -->
        <div><label class="lbl">Agents intervenants</label>
          <div class="grid3">
            <div><label class="lbl" style="font-size:11px">Agent 1</label>
              <select id="f-agent1" onchange="updateHeuresTotal()"><option value="">--</option></select>
            </div>
            <div><label class="lbl" style="font-size:11px">Agent 2</label>
              <select id="f-agent2" onchange="updateHeuresTotal()"><option value="">--</option></select>
            </div>
            <div><label class="lbl" style="font-size:11px">Agent 3</label>
              <select id="f-agent3" onchange="updateHeuresTotal()"><option value="">--</option></select>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div>
            <label class="lbl">Heures / agent</label>
            <input type="number" id="f-heures" step="0.01" min="0" value="0" oninput="updateHeuresTotal()">
            <div id="f-heures-total" style="font-size:11px;color:#185FA5;margin-top:3px;font-weight:500"></div>
          </div>
          <div>
            <label class="lbl">Météo <span id="meteo-loading" style="display:none">⟳</span></label>
            <select id="f-meteo">
              <option value="">Auto / saisir</option>
              <option>Ensoleillé</option><option>Nuageux</option><option>Pluie</option>
              <option>Orage</option><option>Neige</option><option>Vent</option><option>Brouillard</option>
            </select>
            <label style="font-size:11px;color:#666;margin-top:4px;display:flex;align-items:center;gap:5px">
              <input type="checkbox" id="f-autometeo" checked> Auto (Genève)
            </label>
          </div>
        </div>

        <div>
          <label class="lbl">Température (°C) <span id="temp-loading" style="display:none">⟳</span></label>
          <input type="number" id="f-temp" placeholder="Auto ou saisir manuellement" step="0.1">
        </div>

        <div>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;padding:8px 10px;background:#FFF5F5;border:0.5px solid #F09595;border-radius:8px">
            <input type="checkbox" id="f-erreur-parcours" style="width:16px;height:16px;accent-color:#A32D2D">
            <span style="font-weight:500;color:#A32D2D">Erreur de parcours</span>
          </label>
        </div>

        <div>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;padding:8px 10px;background:#FAEEDA;border:0.5px solid #EF9F27;border-radius:8px">
            <input type="checkbox" id="f-cp-crt" style="width:16px;height:16px;accent-color:#854F0B">
            <span style="font-weight:500;color:#854F0B">CP de CRT</span>
          </label>
        </div>

        <div><label class="lbl">Notes</label>
          <textarea id="f-notes" rows="2"></textarea>
        </div>

        <button class="btn-primary" onclick="addEvent()" style="width:100%;padding:8px">+ Ajouter l'événement</button>
      </div>
    </div>

    <!-- PARTIE DROITE -->
    <div id="right-panel" style="display:flex;flex-direction:column;gap:14px">
      <div class="card" style="padding:12px 14px">
        <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">
          <input type="text" id="filter-q" placeholder="Rechercher…" oninput="renderRight()" style="flex:1;min-width:150px">
          <select id="filter-ligne" onchange="renderRight()" style="flex:1;min-width:80px">
            <option>Toutes</option><option>TW</option><option>TB</option><option>Mixte</option>
            <option>CMB</option><option>CMJ</option><option>CMC</option>
          </select>
          <select id="filter-type" onchange="renderRight()" style="flex:1;min-width:120px"><option>Tous</option></select>
          <select id="filter-motif" onchange="renderRight()" style="flex:1;min-width:110px"><option>Tous</option></select>
          <select id="filter-meteo" onchange="renderRight()" style="flex:1;min-width:100px"><option>Toutes</option></select>
          <select id="filter-agent" onchange="renderRight()" style="flex:1;min-width:110px"><option>Tous agents</option></select>
        </div>
      </div>
      <div id="stats-area"></div>
      <div id="charts-area"></div>
      <div id="list-area"></div>
    </div>
  </div>
</div>

// ——— Météo ———
function mapWeatherCode(code,wind){
  if([95,96,99].includes(code))return"Orage";
  if((code>=61&&code<=67)||(code>=51&&code<=57)||(code>=80&&code<=82))return"Pluie";
  if((code>=71&&code<=77)||(code>=85&&code<=86))return"Neige";
  if(wind!=null&&wind>=50&&(code===0||[1,2,3,45,48].includes(code)))return"Vent";
  if(code===0)return"Ensoleillé";if([45,48].includes(code))return"Brouillard";
  return"Nuageux";
}
async function fetchMeteoAndTemp(date){
  try{
    if(!date)return null;
    const ymd=date.slice(0,10),today=new Date().toISOString().slice(0,10);
    const base=ymd<today?"https://archive-api.open-meteo.com/v1/archive":"https://api.open-meteo.com/v1/forecast";
    const url=new URL(base);
    url.searchParams.set("latitude",GENEVA.lat);url.searchParams.set("longitude",GENEVA.lon);
    url.searchParams.set("timezone",GENEVA.tz);url.searchParams.set("start_date",ymd);url.searchParams.set("end_date",ymd);
    url.searchParams.set("daily","weathercode,windspeed_10m_max,temperature_2m_max,temperature_2m_min");
    const data=await(await fetch(url.toString())).json();
    const code=data?.daily?.weathercode?.[0],wind=data?.daily?.windspeed_10m_max?.[0];
    const tmax=data?.daily?.temperature_2m_max?.[0],tmin=data?.daily?.temperature_2m_min?.[0];
    return{meteo:typeof code==="number"?mapWeatherCode(code,typeof wind==="number"?wind:undefined):null,
           temp:(typeof tmax==="number"&&typeof tmin==="number")?Math.round((tmax+tmin)/2):null};
  }catch{return null;}
}

function formatFR(iso){if(!iso)return"";const d=new Date(iso);if(isNaN(d.getTime()))return iso;return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"});}
function setSyncStatus(s,m){const el=document.getElementById("sync-status");if(!el)return;el.className="sync-"+s;el.textContent=m;}
function meteoIcon(m){return{"Ensoleillé":"☀","Nuageux":"⛅","Pluie":"🌧","Orage":"⛈","Neige":"❄","Vent":"💨","Brouillard":"🌫"}[m]||"";}
function nbAgents(e){return[e.agent1,e.agent2,e.agent3].filter(a=>a&&a.trim()!=="").length||1;}
function totalHeures(e){return(Number(e.heures)||0)*nbAgents(e);}

    document.getElementById("loading").style.display="none";

    updateFilterOptions();
    renderRight();
  },(err)=>{setSyncStatus("error","✕ Erreur connexion");console.error(err);});
}

function updateFilterOptions(){
  const allTypes=[...new Set(events.map(e=>e.type).filter(Boolean))].sort();
  const allMotifs=[...new Set(events.map(e=>e.motif).filter(Boolean))].sort();
  const allMeteos=[...new Set(events.map(e=>e.meteo).filter(Boolean))];
  const allAgents=[...new Set(events.flatMap(e=>[e.agent1,e.agent2,e.agent3]).filter(Boolean))].sort();
  const ftS=document.getElementById("filter-type"),curT=ftS.value;
  ftS.innerHTML=`<option>Tous</option>${allTypes.map(t=>`<option${t===curT?" selected":""}>${t}</option>`).join("")}`;
  const fmS=document.getElementById("filter-motif"),curM=fmS.value;
  fmS.innerHTML=`<option>Tous</option>${allMotifs.map(m=>`<option${m===curM?" selected":""}>${m}</option>`).join("")}`;
  const feS=document.getElementById("filter-meteo"),curE=feS.value;
  feS.innerHTML=`<option>Toutes</option>${allMeteos.map(m=>`<option${m===curE?" selected":""}>${m}</option>`).join("")}`;
  const faS=document.getElementById("filter-agent"),curA=faS.value;
  faS.innerHTML=`<option>Tous agents</option>${allAgents.map(a=>`<option${a===curA?" selected":""}>${a}</option>`).join("")}`;
}

  const agent1=document.getElementById("f-agent1").value;

  }
  const nbAg=[agent1,agent2,agent3].filter(a=>a&&a.trim()!=="").length||1;
  try{
    await addDoc(colRef,{titre,date,lieu,ligne,type,motif,poste:poste||"",
      meteo:meteo||"",temperature:isNaN(temp)?null:temp,
      heures,heuresTotal:heures*nbAg,nbAgents:nbAg,
      agent1:agent1||"",agent2:agent2||"",agent3:agent3||"",
      notes,erreurParcours:erreurParcours,cpCrt:cpCrt,createdAt:Date.now()});
    document.getElementById("f-titre").value="";document.getElementById("f-date").value="";
    document.getElementById("f-lieu").value="";document.getElementById("f-ligne").value="TW";
    document.getElementById("f-heures").value="0";document.getElementById("f-heures-total").textContent="";
    document.getElementById("f-agent1").value="";document.getElementById("f-agent2").value="";
    document.getElementById("f-agent3").value="";document.getElementById("f-notes").value="";
    document.getElementById("f-meteo").value="";document.getElementById("f-temp").value="";
    document.getElementById("f-erreur-parcours").checked=false;
    document.getElementById("f-cp-crt").checked=false;
    onLigneChange();
  }catch(e){setSyncStatus("error","✕ Erreur");alert("Erreur: "+e.message);}

window.saveEdit=async()=>{

  editDraft.lieu    = document.getElementById("edit-lieu")?.value   || editDraft.lieu;
  editDraft.notes   = document.getElementById("edit-notes")?.value  || "";
  editDraft.poste   = document.getElementById("edit-poste")?.value  || "";
  editDraft.agent1  = document.getElementById("edit-ag1")?.value    || "";
  editDraft.agent2  = document.getElementById("edit-ag2")?.value    || "";
  editDraft.agent3  = document.getElementById("edit-ag3")?.value    || "";
  // Collecte les listes déroulantes
  editDraft.titre   = document.getElementById("edit-titre")?.value  || editDraft.titre;
  editDraft.date    = document.getElementById("edit-date")?.value   || editDraft.date;
  editDraft.ligne   = document.getElementById("edit-ligne")?.value  || editDraft.ligne;
  editDraft.type    = document.getElementById("edit-type")?.value   || editDraft.type;

  editDraft.heures  = parseFloat(document.getElementById("edit-heures")?.value)||0;

  // Calcul heures total

  editDraft.nbAgents=nbAg; editDraft.heuresTotal=editDraft.heures*nbAg;

function toRow(e){return{titre:e.titre,date:e.date,lieu:e.lieu,ligne:e.ligne,type:e.type,motif:e.motif,poste:e.poste||"",erreur_parcours:e.erreurParcours?"Oui":"Non",cp_crt:e.cpCrt?"Oui":"Non",meteo:e.meteo,temperature:e.temperature??'',heures_par_agent:e.heures,nb_agents:nbAgents(e),heures_total:totalHeures(e),agent1:e.agent1||"",agent2:e.agent2||"",agent3:e.agent3||"",notes:e.notes||""};}

function exportParMois(){const evs=filtered();const groups={};evs.forEach(ev=>{const k=(ev.date||"").slice(0,7)||"inconnu";(groups[k]=groups[k]||[]).push(ev);});const wb=XLSX.utils.book_new();Object.entries(groups).forEach(([mois,rows])=>{const ws=XLSX.utils.json_to_sheet(rows.map(toRow));XLSX.utils.book_append_sheet(wb,ws,mois.slice(0,31));});XLSX.writeFile(wb,`evenements_par_mois_${new Date().toISOString().slice(0,10)}.xlsx`);}

async function handleImport(file){
  if(!file)return;const buf=await file.arrayBuffer();const wb=XLSX.read(buf,{type:"array"});
  const ws=wb.Sheets[wb.SheetNames[0]];const json=XLSX.utils.sheet_to_json(ws,{defval:""});
  setSyncStatus("loading","⟳ Import en cours...");
  try{
    const batch=writeBatch(db);
    for(let i=0;i<json.length;i++){
      const r=json[i];const ref=doc(collection(db,"evenements"));
      const heures=Number(r.heures_par_agent||r.heures||0)||0;
      const ag1=String(r.agent1||""),ag2=String(r.agent2||""),ag3=String(r.agent3||"");
      const nbAg=[ag1,ag2,ag3].filter(a=>a.trim()!=="").length||1;
      batch.set(ref,{titre:String(r.titre||""),date:String(r.date||"").slice(0,10),lieu:String(r.lieu||""),ligne:String(r.ligne||"TW"),type:String(r.type||""),motif:String(r.motif||""),poste:String(r.poste||""),meteo:String(r.meteo||""),temperature:Number(r.temperature)||null,heures,heuresTotal:heures*nbAg,nbAgents:nbAg,agent1:ag1,agent2:ag2,agent3:ag3,notes:String(r.notes||""),createdAt:Date.now()-i});
    }
    await batch.commit();
  }catch(e){setSyncStatus("error","✕ Erreur import");alert("Erreur import: "+e.message);}
}
window.handleImport=handleImport;

function filtered(){
  const q=(document.getElementById("filter-q")?.value||"").toLowerCase();
  const fL=document.getElementById("filter-ligne")?.value||"Toutes";
  const fT=document.getElementById("filter-type")?.value||"Tous";
  const fM=document.getElementById("filter-motif")?.value||"Tous";
  const fE=document.getElementById("filter-meteo")?.value||"Toutes";
  const fA=document.getElementById("filter-agent")?.value||"Tous agents";
  return events.filter(e=>{
    const mQ=`${e.titre} ${e.lieu} ${e.ligne} ${e.type} ${e.motif} ${e.poste} ${e.meteo} ${e.agent1} ${e.agent2} ${e.agent3}`.toLowerCase().includes(q);
    const mA=fA==="Tous agents"||[e.agent1,e.agent2,e.agent3].includes(fA);
    return mQ&&(fL==="Toutes"||e.ligne===fL)&&(fT==="Tous"||e.type===fT)&&(fM==="Tous"||e.motif===fM)&&(fE==="Toutes"||e.meteo===fE)&&mA;
  });
}

            <button class="btn-danger" onclick="removeEvent('${e.id}')" style="font-size:12px;margin-left:4px">Supprimer</button>
          </td></tr>`;
      }).join("")}
      </tbody>
    </table></div>
  </div>
  <div style="text-align:center;font-size:11px;color:#aaa;margin-top:8px;padding:12px 0;border-top:0.5px solid #e0e0e0">
    Données partagées en temps réel via Firebase
  </div>`;

  if(editingId&&editDraft){
    const sv=(id,val)=>{const s=document.getElementById(id);if(!s||!val)return;for(let i=0;i<s.options.length;i++){if(s.options[i].text===val||s.options[i].value===val){s.selectedIndex=i;break;}}};
    sv("edit-ag1",editDraft.agent1);
    sv("edit-ag2",editDraft.agent2);
    sv("edit-ag3",editDraft.agent3);
  }
}
window.renderRight=renderRight;

initAgentSelects();
onLigneChange();
startListening();
</script>
